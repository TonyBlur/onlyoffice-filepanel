name: Build and Publish

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  IMAGE_NAME: onlyoffice-filepanel

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --legacy-peer-deps

      - name: Compile TypeScript & build frontend
        run: npm run build

  docker-build-push:
    needs: build-check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare repository names
        id: repo
        run: |
          GHCR_REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "ghcr_repo=$GHCR_REPO" >> "$GITHUB_OUTPUT"

      - name: Prepare image list
        id: images
        run: |
          IMAGES="${{ steps.repo.outputs.ghcr_repo }}"
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            IMAGES="$IMAGES"$'\n'"docker.io/${DOCKERHUB_USERNAME}/${IMAGE_NAME}"
          fi
          {
            echo 'images<<IMAGES_EOF'
            echo "$IMAGES"
            echo 'IMAGES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dockerhub-sync-readme:
    needs: docker-build-push
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Sync README
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker://lsiodev/readme-sync:latest
        env:
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ env.DOCKERHUB_TOKEN }}
          GIT_REPOSITORY: ${{ github.repository }}
          DOCKER_REPOSITORY: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          GIT_BRANCH: main
        with:
          entrypoint: node
          args: /opt/docker-readme-sync/sync

  create-release:
    needs: docker-build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get commits since last release
        id: commits
        run: |
          git fetch --tags
          CURRENT_VERSION="${{ steps.version.outputs.version }}"
          LAST_TAG=$(git tag -l --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^v${CURRENT_VERSION}$" | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log HEAD --pretty=format:"- %s (%h)" --no-merges)
            if [ -z "$COMMITS" ]; then
              echo "has_commits=false" >> "$GITHUB_OUTPUT"
            else
              echo "has_commits=true" >> "$GITHUB_OUTPUT"
            fi
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
            if [ -z "$COMMITS" ]; then
              echo "has_commits=false" >> "$GITHUB_OUTPUT"
            else
              echo "has_commits=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          {
            echo 'commits<<COMMITS_EOF'
            echo "$COMMITS"
            echo 'COMMITS_EOF'
          } >> "$GITHUB_OUTPUT"
          echo "Last tag: ${LAST_TAG:-none}"

      - name: Prepare GHCR repository name
        id: ghcr-repo
        run: |
          GHCR_REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "ghcr_repo=$GHCR_REPO" >> "$GITHUB_OUTPUT"

      - name: Generate release body
        id: release_body
        env:
          GHCR_REPO: ${{ steps.ghcr-repo.outputs.ghcr_repo }}
          VERSION: ${{ steps.version.outputs.version }}
          HAS_COMMITS: ${{ steps.commits.outputs.has_commits }}
          COMMITS: ${{ steps.commits.outputs.commits }}
        run: |
          {
            echo '## Docker Images'
            echo ''
            echo "- \`ghcr.io/${GITHUB_REPOSITORY,,}:latest\`"
            echo "- \`ghcr.io/${GITHUB_REPOSITORY,,}:${VERSION}\`"
            if [ -n "$DOCKERHUB_USERNAME" ]; then
              echo ''
              echo "- \`${DOCKERHUB_USERNAME}/${IMAGE_NAME}:latest\`"
              echo "- \`${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${VERSION}\`"
            fi
            if [ "$HAS_COMMITS" = "true" ] && [ -n "$COMMITS" ]; then
              echo ''
              echo '## Changes'
              echo ''
              echo "$COMMITS"
            fi
          } > release_body.txt
          {
            echo 'body<<BODY_EOF'
            cat release_body.txt
            echo 'BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Delete existing release if present
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: v${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists, deleting..."
            gh release delete "$TAG_NAME" --yes || true
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release_body.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
