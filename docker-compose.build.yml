services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DOC_SERVER_URL: ${DOC_SERVER_URL:-http://localhost:8380}
      DOC_SERVER_INTERNAL_HOST: ${DOC_SERVER_INTERNAL_HOST:-http://host.docker.internal:3000}
      DOC_SERVER_JWT_SECRET: ${DOC_SERVER_JWT_SECRET:-hUQTo541dF2UjKzO56Ux9jHOD62csevJ}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      PORT: 3000
    ports:
      - "${APP_EXTERNAL_PORT:-3000}:3000"
    volumes:
      - ${HOST_FILES_PATH:-files_data}:/app/server/data/files:rw
    networks:
      - onlyoffice-network
    restart: unless-stopped

volumes:
  files_data:
    driver: local

networks:
  onlyoffice-network:
    driver: bridge
